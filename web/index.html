  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization

  <script src="flutter_bootstrap.js" async=""></script>
  <script>
    // La app se compila con --pwa-strategy=none: NO hay service worker de
    // Flutter. La caché la controlan los headers HTTP (web/_headers: no-cache
    // en index.html / flutter_bootstrap.js / main.dart.js), así cada deploy se
    // ve al instante sin que el usuario tenga que borrar nada.
    //
    // Este bloque rescata a los usuarios que quedaron con el SW viejo cacheando
    // una versión anterior: lo desregistra, limpia sus caches y recarga UNA vez.
    // No toca push-sw.js (scope /push/), que sigue manejando las notificaciones.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        var killed = false;
        regs.forEach(function (reg) {
          var sw = reg.active || reg.waiting || reg.installing;
          if (sw && sw.scriptURL &&
              sw.scriptURL.indexOf('flutter_service_worker.js') !== -1) {
            reg.unregister();
            killed = true;
          }
        });
        if (killed) {
          if (window.caches && caches.keys) {
            caches.keys().then(function (keys) {
              keys.forEach(function (k) {
                if (k.indexOf('flutter') !== -1) caches.delete(k);
              });
            });
          }
          if (!sessionStorage.getItem('kaliSwCleaned')) {
            sessionStorage.setItem('kaliSwCleaned', '1');
            window.location.reload();
          }
        }
      });
    }
  </script>
  <script>
    window.kaliPush = (function () {
      function urlBase64ToUint8Array(base64) {
        var padding = '='.repeat((4 - (base64.length % 4)) % 4);
        var b64 = (base64 + padding).replace(/-/g, '+').replace(/_/g, '/');
        var raw = atob(b64);
        return Uint8Array.from(Array.from(raw).map(function (c) { return c.charCodeAt(0); }));
      }

      return {
        requestPermission: function () {
          return Notification.requestPermission();
        },
        subscribe: function (vapidKey) {
          console.log('[push] registering SW...');
          return navigator.serviceWorker
            .register('/push-sw.js', { scope: '/push/' })
            .then(function (reg) {
              console.log('[push] SW registered — active:', !!reg.active, 'installing:', !!reg.installing, 'waiting:', !!reg.waiting);
              if (reg.active) return reg;
              return new Promise(function (resolve, reject) {
                var sw = reg.installing || reg.waiting;
                if (!sw) { console.log('[push] no SW worker, proceeding'); resolve(reg); return; }
                sw.addEventListener('statechange', function () {
                  console.log('[push] SW statechange:', sw.state);
                  if (sw.state === 'activated') resolve(reg);
                  if (sw.state === 'redundant') reject(new Error('SW redundant'));
                });
              });
            })
            .then(function (reg) {
              console.log('[push] calling pushManager.subscribe...');
              return reg.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: urlBase64ToUint8Array(vapidKey),
              });
            })
            .then(function (sub) {
              console.log('[push] subscribed OK');
              return JSON.stringify(sub);
            })
            .catch(function (err) {
              console.error('[push] subscribe error:', err);
              throw err;
            });
        },
        getSubscription: function () {
          return navigator.serviceWorker
            .getRegistration('/push/')
            .then(function (reg) {
              if (!reg) return null;
              return reg.pushManager.getSubscription().then(function (sub) {
                return sub ? JSON.stringify(sub) : null;
              });
            });
        },
      };
    })();
  </script>
