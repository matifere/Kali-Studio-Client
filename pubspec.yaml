name: kali_studio
description: Kali Studio - gestión de turnos y clases
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  image_picker: ^1.1.2
  intl: ^0.19.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.12.0
  pdfx: ^2.9.0
  url_launcher: ^6.3.0
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  assets:
    - assets/images/
    - assets/docs/
  uses-material-design: true

# Íconos de app (Android adaptive + iOS). Generar con:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/branding/kali_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 24
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/branding/kali_icon_fg.png"

# Splash screen. Generar con:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/images/argrity_logo.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/images/argrity_logo.png"
