name: Build & Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter test

      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          URL=$(echo -n "$SUPABASE_URL" | tr -d '\r\n')
          ANON=$(echo -n "$SUPABASE_ANON" | tr -d '\r\n')
          VAPID=$(echo -n "$VAPID_PUBLIC_KEY" | tr -d '\r\n')
          flutter build web --release \
            "--dart-define=SUPABASE_URL=$URL" \
            "--dart-define=SUPABASE_ANON=$ANON" \
            "--dart-define=VAPID_PUBLIC_KEY=$VAPID"

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHIMPACE_TURNOS }}
          channelId: live
          projectId: chimpace-turnos
