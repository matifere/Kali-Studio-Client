name: Build & Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --branch stable --depth 1 $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: flutter build web --release "--dart-define=SUPABASE_URL=$(echo -n "${SUPABASE_URL}" | tr -d '\r\n')" "--dart-define=SUPABASE_ANON=$(echo -n "${SUPABASE_ANON}" | tr -d '\r\n')" "--dart-define=VAPID_PUBLIC_KEY=$(echo -n "${VAPID_PUBLIC_KEY}" | tr -d '\r\n')"

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHIMPACE_TURNOS }}
          channelId: live
          projectId: chimpace-turnos
