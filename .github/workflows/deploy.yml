name: Build & Deploy to Netlify

on:
  workflow_dispatch: # solo manual, Firebase project fue eliminado — hosting migrado a Netlify

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter test

      - name: Build web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
        run: |
          URL=$(echo -n "$SUPABASE_URL" | tr -d '\r\n')
          ANON=$(echo -n "$SUPABASE_ANON" | tr -d '\r\n')
          VAPID=$(echo -n "$VAPID_PUBLIC_KEY" | tr -d '\r\n')
          flutter build web --release \
            "--dart-define=SUPABASE_URL=$URL" \
            "--dart-define=SUPABASE_ANON=$ANON" \
            "--dart-define=VAPID_PUBLIC_KEY=$VAPID"

      - name: Generate version.json
        run: |
          VERSION=$(date +%s)
          echo "{\"version\":\"$VERSION\"}" > build/web/version.json

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --dir=build/web --message "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: "c3722abe-663d-4393-ba38-a1a4204a8929"
